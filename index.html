<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>FIFA World Cup Analytics</title>
    <style>
      body {
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: #0b1020;
        color: #f5f5f5;
        margin: 0;
        padding: 0;
      }
      .container {
        max-width: 900px;
        margin: 0 auto;
        padding: 2rem 1rem 3rem;
      }
      h1 {
        margin-bottom: 0.5rem;
      }
      p.subtitle {
        margin-top: 0;
        color: #c0c4d0;
      }
      form {
        margin-top: 1.5rem;
        padding: 1.5rem;
        background: #151a2c;
        border-radius: 0.75rem;
        box-shadow: 0 10px 25px rgba(0,0,0,0.4);
      }
      .field-row {
        display: flex;
        flex-wrap: wrap;
        gap: 1rem;
        margin-bottom: 1rem;
      }
      .field {
        flex: 1;
        min-width: 180px;
      }
      label {
        display: block;
        font-size: 0.85rem;
        margin-bottom: 0.3rem;
        color: #c0c4d0;
      }
      input {
        width: 100%;
        padding: 0.5rem 0.7rem;
        border-radius: 0.4rem;
        border: 1px solid #2a3148;
        background: #0f1422;
        color: #f5f5f5;
      }
      input:focus {
        outline: none;
        border-color: #00c896;
        box-shadow: 0 0 0 1px #00c896;
      }
      button {
        margin-top: 0.5rem;
        padding: 0.7rem 1.4rem;
        border-radius: 999px;
        border: none;
        background: linear-gradient(135deg, #00c896, #00a4ff);
        color: #0b1020;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: default;
      }
      .error {
        margin-top: 0.75rem;
        color: #ff6b6b;
        font-size: 0.9rem;
      }
      .result {
        margin-top: 2rem;
        padding: 1.5rem;
        border-radius: 0.75rem;
        background: #151a2c;
        border: 1px solid #2a3148;
      }
      .result h2 {
        margin-top: 0;
      }
      .result ul {
        padding-left: 1.2rem;
      }
      .result li {
        margin-bottom: 0.3rem;
      }
      @media (max-width: 640px) {
        .container {
          padding: 1.5rem 0.75rem 2rem;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>FIFA World Cup Analytics</h1>
      <p class="subtitle">Query AI-powered match predictions backed by AWS analytics.</p>

      <form id="prediction-form">
        <div class="field-row">
          <div class="field">
            <label for="teamA">Team A</label>
            <input id="teamA" name="teamA" type="text" value="Argentina" />
          </div>
          <div class="field">
            <label for="teamB">Team B</label>
            <input id="teamB" name="teamB" type="text" value="France" />
          </div>
          <div class="field">
            <label for="stage">Stage</label>
            <input id="stage" name="stage" type="text" value="Final" />
          </div>
        </div>

        <button id="predict-btn" type="submit">Predict Match</button>
        <div id="error" class="error"></div>
      </form>

      <div id="result" class="result" style="display:none;"></div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
